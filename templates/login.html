<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartPay Guard – Login</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#0d1117;
    color:#fff;
    font-family:Arial, sans-serif;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .auth-card{
    background:#12181f;
    border:1px solid #1f242c;
    border-radius:14px;
    padding:36px 32px;
    width:360px;
  }
  .logo{ text-align:center; font-size:18px; font-weight:700; margin-bottom:4px; }
  .tagline{ text-align:center; font-size:11px; color:#008000; text-transform:uppercase; letter-spacing:.06em; margin-bottom:26px; }
  label{ display:block; font-size:12px; color:#8b949e; margin-bottom:5px; margin-top:14px; }
  input{
    width:100%;
    padding:10px 12px;
    border-radius:6px;
    border:1px solid #2a313b;
    background:#0d1117;
    color:#fff;
    font-size:13px;
    outline:none;
  }
  input:focus{ border-color:#008000; }
  .submit-btn{
    width:100%;
    background:#008000;
    color:#fff;
    border:none;
    padding:12px;
    border-radius:30px;
    font-weight:700;
    font-size:14px;
    margin-top:22px;
    cursor:pointer;
    transition:background .15s;
  }
  .submit-btn:hover{ background:#006600; }
  .switch-link{
    text-align:center;
    font-size:12px;
    color:#8b949e;
    margin-top:18px;
  }
  .switch-link a{ color:#008000; text-decoration:none; font-weight:700; }
  .error-msg{
    display:none;
    background:#ffeef0;
    color:#cf222e;
    border:1px solid #cf222e;
    padding:9px 12px;
    border-radius:6px;
    font-size:12px;
    margin-top:14px;
  }
  .error-msg.show{ display:block; }
</style>
</head>
<body>

<div class="auth-card">
  <div class="logo">🛡️ SMARTPAY GUARD</div>
  <div class="tagline">Sign in to your account</div>

  <div id="errorMsg" class="error-msg"></div>

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="you@example.com" />

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" />

  <button class="submit-btn" onclick="doLogin()">Log In</button>

  <div class="switch-link">
    Don't have an account? <a href="/register-page">Create one</a>
  </div>
</div>

<script>
async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errBox   = document.getElementById('errorMsg');
  errBox.classList.remove('show');

  if (!email || !password) {
    errBox.textContent = 'Please fill in both fields.';
    errBox.classList.add('show');
    return;
  }

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.error) {
      errBox.textContent = data.error;
      errBox.classList.add('show');
    } else {
      window.location.href = '/';
    }
  } catch (err) {
    errBox.textContent = 'Network error. Please try again.';
    errBox.classList.add('show');
  }
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
